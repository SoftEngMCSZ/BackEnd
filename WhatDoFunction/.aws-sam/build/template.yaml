AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: 'cs3733_gp

  SAM Template for cs3733_gp

  '
Globals:
  Function:
    Timeout: 20
Resources:
  WhatDoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: WhatDoFunction
      Handler: me.whatdo.app.App::handleRequest
      Runtime: java8
      MemorySize: 512
      Environment:
        Variables:
          PARAM1: VALUE
      Events:
        HelloWorld:
          Type: Api
          Properties:
            Path: /hello
            Method: get
Outputs:
  WhatDoApi:
    Description: API Gateway endpoint URL for Prod stage for Hello World function
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/hello/
  WhatDoFunction:
    Description: WhatDo Lambda Function ARN
    Value:
      Fn::GetAtt:
      - WhatDoFunction
      - Arn
  WhatDoFunctionIamRole:
    Description: Implicit IAM Role created for Hello World function
    Value:
      Fn::GetAtt:
      - WhatDoFunction
      - Arn
